name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: make install

      - name: Run tests
        run: make test

      - name: Run sample pipeline
        run: make all-sample

      - name: Upload pipeline outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            data/outputs/harmonization_run_report.md
            data/outputs/qa_results.csv
            data/outputs/schema_conformance_report.csv
            data/outputs/steward_review_queue.csv
          retention-days: 7
